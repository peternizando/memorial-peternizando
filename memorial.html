<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Memorial Peternizando</title>

    <link rel="stylesheet"
          href="css/style.css?v=1.0.0">

</head>

<body>

    <main class="container">

        <section class="card">

            <img
                id="fotoPrincipal"
                src=""
                alt="Foto do pet">

            <h1 id="nomePet"></h1>

            <p id="mensagem"></p>

            <section class="bloco">

                <h2>❤️ Recordações</h2>

                <p class="placeholder">

                    Reviva alguns momentos especiais compartilhados com
                    <strong id="nomeRecordacoes"></strong>.

                </p>

                <div
                    id="galeria"
                    class="galeria-preview">

                    <div class="foto-preview"></div>

                    <div class="foto-preview"></div>

                    <div class="foto-preview"></div>

                    <div class="foto-preview"></div>

                </div>

            </section>

            <section class="bloco">

                <h2>🎥 Uma lembrança especial</h2>

                <p class="placeholder">

                    Assista a um momento inesquecível
                    que ficará guardado para sempre.

                </p>

                <div
                    id="video"
                    class="video-preview">

                    ▶

                </div>

            </section>

            <button id="btnCompartilhar">

                ❤️ Compartilhar esta homenagem

            </button>

            <footer>

                <h3>

                    Peternizando

                </h3>

                <p>

                    Transformando saudade em presença.

                </p>

            </footer>

        </section>

    </main>

    <script src="js/memorial.js?v=1.0.0"></script>

</body>

</html>
