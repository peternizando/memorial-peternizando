<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <link rel="icon"
          type="image/png"
          href="assets/icones/favicon.png">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Memorial Peternizando</title>

    <link rel="stylesheet"
          href="css/style.css?v=1.2.0">

</head>

<body>

    <main class="container">

        <article class="card">

            <!-- ======================================================
                 CABEÇALHO
                 ====================================================== -->

            <header class="cabecalho">

                <img
                    id="fotoPrincipal"
                    src=""
                    alt="Foto do pet">

                <h1 id="nomePet"></h1>

                <p id="mensagem"></p>

            </header>

            <!-- ======================================================
                 RECORDAÇÕES
                 ====================================================== -->

            <section class="bloco">

                <h2>

                    ❤️ Recordações

                </h2>

                <p class="descricao">

                    Reviva alguns momentos especiais compartilhados com

                    <strong id="nomeRecordacoes"></strong>.

                </p>

                <div
                    id="galeria"
                    class="galeria">

                </div>

            </section>

            <!-- ======================================================
                 VÍDEO
                 ====================================================== -->

            <section class="bloco">

                <h2>

                    🎥 Uma lembrança especial

                </h2>

                <p class="descricao">

                    Um momento inesquecível que permanecerá vivo para sempre.

                </p>

                <div id="video">

                    <div class="video-placeholder">

                        <img
                            src="assets/placeholders/placeholder-video.svg"
                            alt="Vídeo">

                    </div>

                </div>

            </section>

            <!-- ======================================================
                 COMPARTILHAR
                 ====================================================== -->

            <section class="bloco">

                <button
                    id="btnCompartilhar"
                    type="button">

                    ❤️ Compartilhar esta homenagem

                </button>

            </section>

            <!-- ======================================================
                 RODAPÉ
                 ====================================================== -->

            <footer>

                <div class="footer-logo">

                    <img
                        id="logoPeternizando"
                        src="assets/logos/logo-peternizando.png"
                        alt="Logo da Peternizando">

                    <h3>

                        Peternizando

                    </h3>

                </div>

                <p>

                    Transformando saudade em presença.

                </p>

            </footer>

        </article>

    </main>

    <!-- ======================================================
         LIGHTBOX
         ====================================================== -->

    <div
        id="lightbox"
        class="lightbox">

        <span
            id="fecharLightbox">

            ✕

        </span>

        <img
            id="imagemLightbox"
            src=""
            alt="Foto ampliada">

    </div>

    <!-- ======================================================
         JAVASCRIPT
         ====================================================== -->

    <script src="js/memorial.js?v=1.2.0"></script>

    <script src="js/galeria.js?v=1.2.0"></script>

    <script src="js/lightbox.js?v=1.2.0"></script>

</body>

</html>
