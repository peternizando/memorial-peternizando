<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <link rel="icon"
      type="image/png"
      href="assets/favicon.png">    

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Memorial Peternizando</title>

    <link rel="stylesheet"
          href="css/style.css?v=1.1.0">

</head>

<body>

    <main class="container">

        <article class="card">

            <!-- CABEÇALHO -->

            <header class="cabecalho">

                <img
                    id="fotoPrincipal"
                    src=""
                    alt="Foto do pet">

                <h1 id="nomePet"></h1>

                <p id="mensagem"></p>

            </header>

            <!-- RECORDAÇÕES -->

            <section class="bloco">

                <h2>

                    ❤️ Recordações

                </h2>

                <p class="descricao">

                    Reviva alguns momentos especiais compartilhados com
                    <strong id="nomeRecordacoes"></strong>.

                </p>

                <div id="galeria"
                     class="galeria">

                </div>

            </section>

            <!-- VÍDEO -->

            <section class="bloco">

                <h2>

                    🎥 Uma lembrança especial

                </h2>

                <p class="descricao">

                    Um momento inesquecível que permanecerá vivo para sempre.

                </p>

                <div id="video">

                    <div class="video-placeholder">

                        Vídeo disponível em breve

                    </div>

                </div>

            </section>

            <!-- COMPARTILHAR -->

            <section class="bloco">

                <button id="btnCompartilhar">

                    ❤️ Compartilhar esta homenagem

                </button>

            </section>

            <!-- RODAPÉ -->


<footer>

    <div class="footer-logo">

        <img
            src="assets/logo-peternizando.png"
            alt="Peternizando">

        <h3>

            Peternizando

        </h3>

    </div>

    <p>

        Transformando saudade em presença.

    </p>

</footer>

        </article>

    </main>

    <script src="js/memorial.js?v=1.1.0"></script>

    <script src="js/galeria.js?v=1.1.0"></script>

</body>

</html>
