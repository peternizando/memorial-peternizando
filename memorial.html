<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="assets/favicon.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memorial Peternizando</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <article class="card">

            <!-- ======================================================
                 CABEÇALHO
                 ====================================================== -->

            <header class="cabecalho">

                <img id="fotoPrincipal" src="" alt="Foto do pet">

                <h1 id="nomePet"></h1>

                <p id="mensagem"></p>

            </header>

            <!-- ======================================================
                 RECORDAÇÕES
                 ====================================================== -->

            <section class="bloco">

                <h2>

                    ❤️ Recordações

                </h2>

                <p class="descricao">

                    Reviva alguns momentos especiais compartilhados com
                    <strong id="nomeRecordacoes"></strong>.

                </p>

                <div id="galeria" class="galeria">

                </div>

            </section>

            <!-- ======================================================
                 VÍDEO
                 ====================================================== -->

            <section class="bloco">

                <h2>

                    🎥 Uma lembrança especial

                </h2>

                <p class="descricao">

                    Reviva um momento inesquecível.

                </p>

                <div id="video">

                    <div class="video-placeholder">

                        <img src="assets/placeholders/placeholder-video.svg" alt="Vídeo">

                        <p>

                            Nenhum vídeo disponível.

                        </p>

                    </div>

                </div>

            </section>

            <!-- ======================================================
                 COMPARTILHAR
                 ====================================================== -->

            <section class="bloco">

                <button id="btnCompartilhar">

                    ❤️ Compartilhar esta homenagem

                </button>

            </section>

            <!-- ======================================================
                 RODAPÉ
                 ====================================================== -->

            <footer>

                <div class="footer-logo">

                    <img src="assets/logos/logo-peternizando.png" alt="Peternizando" loading="lazy">

                    <h3>

                        Peternizando

                    </h3>

                </div>

                <p>

                    Transformando saudade em presença.

                </p>

            </footer>

        </article>

    </main>

    <!-- ======================================================
         LIGHTBOX
         ====================================================== -->

    <div id="lightbox" class="lightbox" tabindex="0">

        <div class="lightbox-conteudo">

            <!-- Fechar -->

            <button id="fecharLightbox" class="lightbox-botao" aria-label="Fechar">

                ✕

            </button>

            <!-- Foto anterior -->

            <button id="fotoAnterior" class="lightbox-navegacao lightbox-anterior" aria-label="Foto anterior">

                ❮

            </button>

            <!-- Imagem -->

            <img id="imagemLightbox" src="" alt="Foto ampliada">

            <!-- Próxima foto -->

            <button id="fotoProxima" class="lightbox-navegacao lightbox-proxima" aria-label="Próxima foto">

                ❯

            </button>

            <!-- Contador -->

            <div id="contadorLightbox" class="lightbox-contador">

                1 de 1

            </div>

        </div>
    </div>

    <script src="js/memorial.js"></script>

    <script src="js/galeria.js?v=1.5.0"></script>

    <script src="js/lightbox.js?v=1.5.0"></script>

    <script src="js/midia.js?v=1.5.0"></script>

    <script src="js/compartilhar.js?v=1.5.0"></script>

</body>

</html>
